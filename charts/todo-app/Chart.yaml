apiVersion: v2
name: todo-app
description: A Helm chart for the Todo application
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: postgresql
    version: "12.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: "18.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: kafka
    version: "27.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: kafka.enabled