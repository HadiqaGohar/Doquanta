apiVersion: v1
kind: Secret
metadata:
  name: {{ include "todo-app.fullname" . }}-secrets
  labels:
    {{- include "todo-app.labels" . | nindent 4 }}
type: Opaque
data:
  auth-secret: {{ .Values.auth.secret | default "ZGVmYXVsdF9zZWNyZXRfZm9yX2Rldg==" | quote }}  # Default: default_secret_for_dev in base64